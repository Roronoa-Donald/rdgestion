version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rdgestion_postgres
    environment:
      POSTGRES_DB: rdgestion_db
      POSTGRES_USER: rdgestion_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rdgestion_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdgestion_user -d rdgestion_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rdgestion_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://rdgestion_user:${POSTGRES_PASSWORD:-rdgestion_password}@postgres:5432/rdgestion_db
      JWT_SECRET: ${JWT_SECRET:-change_me_rdgestion_dev_jwt_secret_minimum_256_bits}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-10}
      SUPERADMIN_PHONE: "${SUPERADMIN_PHONE:-+22890000000}"
      SUPERADMIN_PASSWORD: "${SUPERADMIN_PASSWORD:-ChangeMe123!}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
