<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDGESTION — Gestion de Stock & POS SaaS</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Solution SaaS ultra-rapide de gestion de stock et caisse enregistreuse pour commerces en Afrique de l'Ouest.">

  <link rel="icon" type="image/svg+xml" href="src/assets/icon.svg">
  <link rel="shortcut icon" href="src/assets/icon.svg">
  
  <!-- Content Security Policy for production -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src 'self' http://localhost:* https://*; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com;">

  <!-- CSS Stylesheet — preload to prevent FOUC -->
  <link rel="preload" href="src/css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="src/css/style.css"></noscript>
  
  <!-- Google Fonts: Rubik (display) + Nunito Sans (body) — UI UX Pro Max recommendation -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- PWA Manifest & Themes -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f7f7f5">
</head>
<body>

  <a href="#content-area" class="skip-link">Aller au contenu principal</a>

  <div id="app-layout">
    <!-- Barre Latérale (Sidebar) -->
    <aside id="sidebar-navigation" class="sidebar" style="display: none;">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-icon">RD</div>
          <span>RDGESTION</span>
        </div>
      </div>
      
      <ul class="sidebar-menu" role="navigation" aria-label="Menu principal">
        <li class="menu-item" id="nav-dashboard">
          <a href="#/dashboard">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

        </li>
        <li class="menu-item" id="nav-pos">

            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            Caisse POS
          </a>
        </li>
        <li class="menu-item" id="nav-products">
          <a href="#/products">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Produits
          </a>
        </li>
        <li class="menu-item" id="nav-stock">
          <a href="#/stock">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0v10l-8 4m0-14v14m0-10L4 7m0 0v10l8 4M20 7l-8 4M4 7l8 4"/><path d="M9 14l2 2 4-4" stroke="currentColor" stroke-width="2.5"/></svg>
            Gestion Stock
          </a>
        </li>
        <li class="menu-item" id="nav-sales">
          <a href="#/sales">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            Historique Ventes
          </a>
        </li>
        <li class="menu-item" id="nav-logs">

            Journal Activité
          </a>
        </li>
        <li class="menu-item" id="nav-settings">
          <a href="#/settings">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>

        <li class="menu-item" id="nav-admin" style="display: none;">
          <a href="#/admin">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            Panel SuperAdmin
          </a>
        </li>
      </ul>
      
      <div class="sidebar-footer">
        <div class="user-badge">
          <div class="user-avatar" id="badge-user-avatar">US</div>
          <div class="user-info">
            <div class="user-name" id="badge-user-name">Gérant Boutique</div>
            <div class="user-role" id="badge-user-role">ADMIN</div>
          </div>
          <button id="logout-btn" title="Se déconnecter" aria-label="Se déconnecter" style="color: var(--text-secondary); padding: 4px;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Zone principale -->
    <div class="main-content">
      <!-- En-tête (Header) -->
      <header id="main-header" class="main-header" style="display: none;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button id="mobile-menu-btn" class="btn-secondary" style="display: none; padding: 8px; border-radius: 50%;" title="Menu">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
          </button>
          <div class="header-title" id="current-view-title">Vue d'ensemble</div>
        </div>
        <div class="header-actions">
          <!-- Notification cloche -->
          <button class="notif-bell" id="bell-btn" title="Notifications" aria-label="Notifications">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span class="notif-badge" id="unread-count" style="display: none;">0</span>
          </button>
          
          <!-- Changement Thème -->
          <button class="theme-toggle" id="theme-btn" title="Changer de thème" aria-label="Changer de thème">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </button>
        </div>
      </header>

      <!-- Zone de rendu des Vues SPA -->
      <main id="content-area" class="content-body">
        <!-- Rendu de la vue ici -->
      </main>
    </div>
  </div>

  <!-- Conteneurs Globaux pour Modales et Panneaux -->
  <div id="sales-modal-container"></div>


  <!-- Scripts Application -->
  <script src="src/js/init-theme.js"></script>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
